<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{general/layout :: head('Register')}"></head>
  <body>
    <nav th:replace="~{general/layout :: navbar}"></nav>

    <main class="container py-5" style="max-width: 520px;">
      <div class="card">
        <div class="card-body p-4">
          <h2 class="h4 fw-semibold mb-1">Registrarse</h2>

          <form method="post" action="#">
            <div class="mb-3">
              <label class="form-label">Nombre de Usuario</label>
              <input class="form-control" type="text" placeholder="usuario" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input class="form-control" type="password" placeholder="••••••••" required>
            </div>
            <div class="d-grid gap-2">
              <button class="btn btn-primary" type="submit">Entrar</button>
              <a class="btn btn-outline-secondary" href="/">Volver</a>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer class="footer-perfumeria mt-5">
    <div class="container py-4">
        <div class="row text-center text-md-start">

            <!-- Información -->
            <div class="col-md-4 mb-3">
                <h6 class="footer-title">Perfumería</h6>
                <p class="small">© 2026 Perfumería</p>
                
            </div>

            <!-- Contacto -->
            <div class="col-md-4 mb-3">
                <h6 class="footer-title">Contacto</h6>
                <p class="small">
                    <i class="bi bi-envelope"></i>
                    <a href="mailto:perfumeria1920@gmail.com">perfumeria1920@gmail.com</a>
                </p>
                <p class="small">
                    <i class="bi bi-telephone"></i> +506 8888-8888
                </p>
            </div>

            <!-- Redes -->
            <div class="col-md-4 mb-3">
                <h6 class="footer-title">Síguenos</h6>
                <div class="social-icons">
                    <a href="#"><i class="bi bi-facebook"></i> Facebook</a>
                    <a href="#"><i class="bi bi-instagram"></i> Instagram</a>
                    <a href="#"><i class="bi bi-whatsapp"></i> WhatsApp</a>
                </div>
            </div>

        </div>
    </div>
</footer>
    <div th:replace="~{general/layout :: scripts}"></div>
  </body>
</html>
