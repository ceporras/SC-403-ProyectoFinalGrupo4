<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{general/layout :: head('Login')}"></head>
  <body>
    <nav th:replace="~{general/layout :: navbar}"></nav>

    <main class="container py-5" style="max-width: 520px;">
      <div class="card">
        <div class="card-body p-4">
          <h2 class="h4 fw-semibold mb-1">Iniciar sesión</h2>
          <p class="muted mb-4"> Spring Security / lógica </p>

          <form method="post" action="#">
            <div class="mb-3">
              <label class="form-label">Usuario</label>
              <input class="form-control" type="text" placeholder="usuario" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input class="form-control" type="password" placeholder="••••••••" required>
            </div>
            <div class="d-grid gap-2">
              <button class="btn btn-primary" type="submit">Entrar</button>
              <a class="btn btn-outline-secondary" href="/">Volver</a>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer th:replace="~{general/layout :: footer}"></footer>
    <div th:replace="~{general/layout :: scripts}"></div>
  </body>
</html>
