<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head th:replace="~{general/layout :: head('Login')}"></head>
    <body class="d-flex flex-column min-vh-100">
        <nav th:replace="~{general/layout :: navbar}"></nav>

        <main class="container py-5 flex-fill" style="max-width: 520px;">
            <div class="card">
                <div class="card-body p-4">
                    <h2 class="h4 fw-semibold mb-1">Iniciar sesión</h2>
                    <div th:if="${param.error}" class="alert alert-danger">
                        Usuario o contraseña incorrectos
                    </div>

                    <div th:if="${param.logout}" class="alert alert-success">
                        Sesión cerrada correctamente
                    </div>
                    <form method="post" th:action="@{/login}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="mb-3">
                            <label class="form-label">Usuario</label>
                            <input class="form-control" type="text" name="username" placeholder="usuario" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input class="form-control" type="password" name="password" placeholder="••••••••" required>
                        </div>
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary" type="submit">Entrar</button>
                            <a class="btn btn-outline-secondary" href="/">Volver</a>
                            <a class="btn btn-secondary" th:href="@{/registro/nuevo}">No tiene cuenta? Registarse</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>

        <footer th:replace="~{general/layout :: footer}"></footer>
        <div th:replace="~{general/layout :: scripts}"></div>
    </body>
</html>
