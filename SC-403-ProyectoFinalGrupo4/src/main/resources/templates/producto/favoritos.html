<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head th:replace="~{general/layout :: head('Favoritos · Listado')}"></head>
    <body class="d-flex flex-column min-vh-100">
        <nav th:replace="~{general/layout :: navbar}"></nav>

        

        <main class="container py-4 flex-fill">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
                <div>
                    <h1 class="h3 mb-0">Mis favoritos</h1>
                    <div class="muted">Mi lista de productos guardados para luego</div>
                </div>
            </div>

            <section class="container py-4">
                <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4">
                    <div th:each="p : ${favoritos}" class="col">
                        <div class="card h-100 shadow-sm position-relative">

                            <!-- Cards de los productos -->
                            <a th:href="@{/producto/detalle/{id}(id=${p.producto.idProducto})}"
                               class="text-decoration-none text-dark">
                                <div class="d-flex justify-content-center align-items-center bg-light p-3" style="height: 200px;">
                                    <img th:src="${p.producto.rutaImagen}" class="img-fluid" 
                                         th:alt="${p.producto.nombre}" 
                                         style="max-height: 100%; object-fit: contain;"/>
                                </div>
                                <div class="card-header bg-white">
                                    <h5 class="card-title text-center text-truncate mb-0" th:text="${p.producto.nombre}">[[#{producto.nombre}]]</h5>
                                </div>
                                <div class="card-body d-flex flex-column">
                                    <p class="card-text text-muted mb-auto text-truncate" th:text="${p.producto.descripcion}">[[#{producto.descripcion}]]</p>
                                </div>
                            </a>
                            <div class="card-footer bg-white d-flex justify-content-between align-items-center">
                                <div class="fw-bold">
                                    <span class="text-success h5" th:text="${#numbers.formatCurrency(p.producto.precio)}">$99.99</span>
                                    <span th:if="${p.producto.stock > 0}" class="badge text-bg-success ms-2" th:text="${p.producto.stock} + ' unidades'"></span>
                                    <span th:unless="${p.producto.stock > 0}" class="badge text-bg-danger ms-2">[[#{producto.estado}]]</span>
                                </div>
                                <form th:action="@{/producto/favorito/eliminar}" th:method="POST" class="d-inline me-2">
                                    <input type="hidden" th:value="${p.producto.idProducto}" name="idProducto"/>
                                    <input type="hidden" value="1" name="cantidad"/>
                                    <button type="submit" 
                                            class="btn btn-sm btn-primary">
                                        <i class="fa-solid fa-star"></i>
                                    </button>
                                </form>
                                <form th:action="@{/producto/carrito/agregar}" th:method="POST" class="d-inline">
                                    <input type="hidden" th:value="${p.producto.idProducto}" name="idProducto"/>
                                    <input type="hidden" value="1" name="cantidad"/>
                                    <button type="submit" 
                                            class="btn btn-sm btn-primary" 
                                            th:disabled="${p.producto.stock == 0}"
                                            onclick="addCart(this.form)">
                                        <i class="fa-solid fa-cart-plus"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>




        <footer th:replace="~{general/layout :: footer}"></footer>
        <div th:replace="~{general/layout :: scripts}"></div>
    </body>
</html>
