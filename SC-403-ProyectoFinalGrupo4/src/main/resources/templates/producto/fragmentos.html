<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <body>
        <script th:src="@{/webjars/bootstrap/5.3.7/js/bootstrap.bundle.min.js}"></script>
        <link th:href="@{/webjars/font-awesome/css/all.min.css}" rel="stylesheet"/>
        <section th:fragment="listado">
            <main class="container py-4">
                <section th:replace="~{producto/fragmentos :: agregar}"></section>


                <!--barra de busqueda  -->
                <div class="card">
                    <div class="card-body">
                        <div class="row g-2 align-items-center mb-3">
                            <div class="col-md-6">
                                <input class="form-control" placeholder="Buscar (UI solamente)" />
                            </div>
                            <div class="col-md-3">
                                <select name="categoria.idCategoria" 
                                        class="form-select" 
                                        aria-label="Default select example">
                                    <option selected>--categoria--</option>
                                    <option th:each="c : ${categorias}" th:value="${c.idCategoria}">
                                        [[${c.nombre}]]
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-3 d-grid">
                                <button class="btn btn-primary" type="button">Aplicar</button>
                            </div>
                            <div class="col-md-3 d-grid">
                                <button class="btn btn-outline-primary" type="button">Limpiar filtro</button>
                            </div>
                        </div>
                        <!-- lista de productos -->
                        <section th:replace="~{producto/fragmentos :: tarjetas-producto}"></section>
                    </div>
                </div>
            </main>
        </section>




        <section th:fragment="tarjetas-producto" class="container py-4">
            <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4">
                <div th:each="p : ${productos}" class="col">
                    <div class="card h-100 shadow-sm position-relative">

                        <!-- boton elipse para modificar y borrar -->
                        <div class="dropdown position-absolute top-0 end-0 m-2" style="z-index:1050;">
                            <button class="btn btn-sm btn-light border-0" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                                <i class="fa-solid fa-ellipsis-vertical"></i>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li>
                                    <a class="dropdown-item" th:href="@{/producto/editar/{id}(id=${p.idProducto})}">
                                        <i class="fa-solid fa-pen me-2"></i> Editar
                                    </a>
                                </li>
                                <li>

                                    <button type="submit" class="dropdown-item text-danger" 
                                            data-bs-toggle="modal" data-bs-target="#confirmModal"
                                            th:data-bs-id="${p.idProducto}" th:data-bs-descripcion="${p.descripcion}">
                                        <i class="fa-solid fa-trash me-2"></i> Eliminar
                                    </button>

                                    
                                </li>
                            </ul>
                        </div>


                        <!-- Cards de los productos -->
                        <div class="d-flex justify-content-center align-items-center bg-light p-3" style="height: 200px;">
                            <img th:src="${p.rutaImagen}" class="img-fluid" 
                                 th:alt="${p.nombre}" 
                                 style="max-height: 100%; object-fit: contain;"/>
                        </div>
                        <div class="card-header bg-white">
                            <h5 class="card-title text-center text-truncate mb-0" th:text="${p.nombre}">Nombre</h5>
                        </div>
                        <div class="card-body d-flex flex-column">
                            <p class="card-text text-muted mb-auto text-truncate" th:text="${p.descripcion}">Descripcion</p>
                        </div>
                        <div class="card-footer bg-white d-flex justify-content-between align-items-center">
                            <div class="fw-bold">
                                <span class="text-success h5" th:text="${#numbers.formatCurrency(p.precio)}">$99.99</span>
                                <span th:if="${p.stock > 0}" class="badge text-bg-success ms-2" th:text="${p.stock} + ' unidades'"></span>
                                <span th:unless="${p.stock > 0}" class="badge text-bg-danger ms-2">Agotado</span>
                            </div>
                            <form th:action="@{/carrito/agregar}" th:method="POST" class="d-inline">
                                <input type="hidden" th:value="${p.idProducto}" name="idProducto"/>
                                <button type="submit" 
                                        class="btn btn-sm btn-primary" 
                                        th:disabled="${p.stock == 0}"
                                        onclick="addCart(this.form)">
                                    <i class="fa-solid fa-cart-plus"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section th:fragment="agregar">
            <!-- Button trigger modal -->
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
                <div>
                    <h1 class="h3 mb-0">Productos</h1>
                    <div class="muted">Lista de productos.</div>
                </div>
                <div class="d-flex gap-2" sec:authorize="hasRole('ROLE_ADMIN')">
                    <button type="button" class="btn btn-primary"
                            data-bs-toggle="modal" data-bs-target="#agregarProductoModal">
                        <i class="fa-solid fa-plus"></i> [[#{producto.agregar}]]</button>
                </div>
            </div>
            <!-- Modal -->
            <div class="modal fade" id="agregarProductoModal"  tabindex="-1" 
                 aria-labelledby="exampleModalLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header bg-info text-white">
                            <h1 class="modal-title fs-5" id="exampleModalLabel">
                                <i class="fa-solid fa-layer-group"></i> [[#{producto.agregar}]]</h1>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <form th:action='@{/producto/guardar}' th:object='${producto}'
                              class='was-validated' enctype="multipart/form-data" method="post">
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label>[[#{producto.categoria}]]</label>
                                    <select name="categoria.idCategoria" 
                                            class="form-select" 
                                            aria-label="Default select example">
                                        <option th:each="c : ${categorias}" th:value="${c.idCategoria}">
                                            [[${c.nombre}]]
                                        </option>
                                    </select>
                                </div>
                                <div class='mb-3'>
                                    <label>[[#{producto.nombre}]]</label>
                                    <input type="text" name='nombre' class='form-control' maxlength="50" required/>
                                </div>
                                <div class="mb-3">
                                    <label>[[#{producto.descripcion}]]</label>                                    
                                    <textarea class="form-control" name="descripcion" rows="3"></textarea>
                                </div>
                                <div class="mb-3">
                                    <label>[[#{producto.stock}]]</label>                                    
                                    <input type="number" class="form-control" name="existencias" min="0" required/>
                                </div>
                                <div class="mb-3">
                                    <label>[[#{producto.precio}]]</label>                                    
                                    <input type="number" class="form-control" name="precio" min="0" required/>
                                </div>
                                <div class='mb-3'>
                                    <label>[[#{producto.activo}]]</label>
                                    <input type="checkbox" name='activo' class='form-check-input'/></div>
                                <div class='mb-3'>
                                    <label>[[#{producto.rutaImagen}]]</label>
                                    <input type="file" name='imagenFile' onchange='mostrarImagen(this);'
                                           class='form-control'/>
                                    <img id='blah' src='#' alt='imagen de categoría' height="200"/></div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                                    <i class="fa-solid fa-xmark"></i> [[#{accion.cerrar}]]</button>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fa-solid fa-floppy-disk"></i> [[#{accion.guardar}]]</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>






        <section th:fragment="confirmarEliminar">
            <div class="modal fade" 
                 id="confirmModal" 
                 tabindex="-1" 
                 aria-labelledby="modalLabel" 
                 aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered custom-modal-animation">
                    <div class="modal-content animate-slide-up">
                        <form th:action="@{/producto/eliminar}" th:object="${producto}" method="post">
                            <input type="hidden" name="idProducto" id="modalId"/>
                            <div class="modal-header bg-warning text-white">
                                <h5 class="modal-title" id="modalLabel">
                                    <i class="fa-solid fa-circle-radiation"></i> [[#{accion.confirmar}]]
                                </h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                            </div>
                            <div class="modal-body">
                                <p>[[#{accion.confirmar.texto1}]] <span id="modalDescripcion"></span>?</p>
                                <h6>[[#{accion.confirmar.texto2}]]</h6>
                            </div>
                            <div class="modal-footer">
                                <button type="submit" class="btn btn-danger">
                                    <i class="fa-solid fa-trash"></i> [[#{accion.eliminar}]]
                                </button>
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                                    <i class="fa-solid fa-xmark"></i> [[#{accion.cerrar}]]
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>

    </body>
</html>
