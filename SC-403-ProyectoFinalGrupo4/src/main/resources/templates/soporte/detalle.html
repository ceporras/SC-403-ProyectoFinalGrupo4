<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head th:replace="~{general/layout :: head('Ticket · Detalle')}"></head>
    <style>
        body {
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .soporte-container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .soporte-card {
            background: #ffffff;
            border: 1px solid #d9d9d9;
            border-radius: 10px;
            padding: 35px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .soporte-title {
            font-size: 38px;
            font-weight: bold;
            color: #111111;
            margin-bottom: 20px;
        }

        .bloque-info {
            margin-bottom: 20px;
            padding: 18px;
            background: #fafafa;
            border: 1px solid #ececec;
            border-radius: 8px;
        }

        .bloque-info strong {
            color: #111111;
        }

        .estado {
            display: inline-block;
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }

        .estado-pendiente {
            background-color: #fff3cd;
            color: #8a6d3b;
        }

        .estado-proceso {
            background-color: #d9edf7;
            color: #31708f;
        }

        .estado-resuelto {
            background-color: #dff0d8;
            color: #3c763d;
        }

        .acciones {
            margin-top: 25px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-secundario {
            background-color: #ffffff;
            color: #000000;
            border: 1px solid #9aa4b2;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: bold;
            text-decoration: none;
        }

        .btn-secundario:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <nav th:replace="~{general/layout :: navbar}"></nav>

    <main th:replace="~{soporte/fragmentos :: detalle}"></main>

    <footer th:replace="~{general/layout :: footer}"></footer>
    <div th:replace="~{general/layout :: scripts}"></div>

</body>
</html>
