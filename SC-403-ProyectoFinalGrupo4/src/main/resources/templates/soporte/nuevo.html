<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
   <head th:fragment="head(titulo)">
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title th:text="${titulo}">Tienda de Perfumes</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link th:href="@{/css/estilos.css}" rel="stylesheet">
        <link th:href="@{/webjars/font-awesome/7.0.0/css/all.min.css}" rel="stylesheet"/>
        <script th:src="@{/js/rutinas.js}"></script>

        <style>
            .brand-dot{
                display:inline-block;
                width:.6rem;
                height:.6rem;
                border-radius:999px;
                background:#0d6efd;
                margin-right:.5rem;
                vertical-align:middle
            }
            .muted{
                color: #6c757d
            }
        </style>
    </head>

    <body>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

        <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-black border-bottom">
            <div class="container">
                <a class="navbar-brand fw-normal text-warning" href="/">
                    FRAGRANCE AURA
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Abrir menú">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navMain">
                   <ul class="navbar-nav me-auto mb-2 mb-lg-0">
    <li class="nav-item"><a class="nav-link" href="/tienda/listado">Tienda</a></li>
    <li class="nav-item"><a class="nav-link" href="/producto/listado">Productos</a></li>
    <li class="nav-item"><a class="nav-link" href="/categoria/listado">Categorías</a></li>
    <li class="nav-item"><a class="nav-link" href="/pedido/listado">Pedidos</a></li>
    <li class="nav-item"><a class="nav-link" href="/factura/listado">Facturas</a></li>
    <li class="nav-item"><a class="nav-link" href="/ticket/listado">Soporte</a></li>
    <li class="nav-item"><a class="nav-link" th:href="@{/cuenta}">Mi cuenta</a></li>
</ul>
                    <div class="d-flex gap-2">
                        <a class="btn btn-outline-light btn-sm" href="/usuario/listado">Admin</a>
                        <a class="btn btn-outline-light btn-sm" href="/login">Ingresar</a>
                    </div>
                </div>
            </div>
        </nav>
</head>
<body>

<div class="soporte-container">
    <div class="soporte-card">
        <div class="soporte-title">Crear ticket de soporte</div>
        <div class="soporte-subtitle">
            Completa la información para reportar el inconveniente.
        </div>

        <div class="nota">
            Nuestro equipo revisará tu solicitud y dará seguimiento al caso.
        </div>

        <form th:action="@{/ticket/guardar}" method="post" th:object="${ticket}">

            <div class="campo">
                <label for="descripcion">Describe tu problema</label>
                <textarea id="descripcion" th:field="*{descripcion}" placeholder="Escribe aquí el detalle de tu consulta o inconveniente..." required></textarea>
            </div>

            <div class="acciones">
                <button type="submit" class="btn-soporte">Enviar ticket</button>
                <a th:href="@{/ticket/listado}" class="btn-secundario">← Volver</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
