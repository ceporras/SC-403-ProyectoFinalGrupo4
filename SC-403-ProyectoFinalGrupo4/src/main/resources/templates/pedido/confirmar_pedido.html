<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head th:replace="~{general/layout :: head('Pedido · Confirmar')}"></head>
    <body>
        <nav th:replace="~{general/layout :: navbar}"></nav>

        <div th:fragment="pedidoConfirmar">
            <div class="row mb-4">
                <div class="col-12">
                    <h1 class="fw-bold">Confirmacion de pedido</h1>
                    <p class="text-muted">Seleccionar direccion y detalles de pago</p>
                </div>
            </div>
            <div class="row g-4">
                <div class="col-lg-6">
                    <div class="col-12">
                        <div class="card shadow-sm">
                            <div class="card-header bg-dark text-white">
                                <h5 class="mb-0">Items del pedido</h5>
                            </div>
                            <div class="card-body">

                                <div th:if="${#lists.isEmpty(itemsPedido)}" class="text-muted">
                                    No hay productos registrados en el pedido.
                                </div>

                                <div th:each="i : ${itemsPedido}" class="border rounded p-3 mb-2 bg-light">
                                    <div class="row">
                                        <div class="col-md-4">
                                            <div class="d-flex justify-content-center align-items-center bg-light p-3" style="height: 100px;">
                                                <img th:src="${i.producto.rutaImagen}" class="img-fluid" 
                                                     th:alt="${i.producto.nombre}" 
                                                     style="max-height: 100%; object-fit: contain;"/>
                                            </div>
                                        </div>
                                        <div class="col-md-4">
                                            <p class="mb-1">
                                                <strong>Nombre</strong>
                                                <span th:text="${i.producto.nombre}"></span>
                                            </p>
                                        </div>

                                        <div class="col-md-4">
                                            <p class="mb-1">
                                                <strong>Precio</strong>
                                                <span th:text="${#numbers.formatCurrency(i.producto.precio)}"></span>
                                            </p>
                                        </div>

                                        <div class="col-md-4">
                                            <p class="mb-1">
                                                <strong>Cantidad</strong>
                                                <span th:text="${i.cantidad}"></span>
                                            </p>
                                        </div>
                                        <div class="col-md-4">
                                            <p class="mb-1">
                                                <strong>Total</strong>
                                                <span th:text="${#numbers.formatCurrency(i.producto.precio*i.cantidad)}"></span>
                                            </p>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-6">
                    <div class="card shadow-sm h-auto">
                        <div class="card-header bg-dark text-white">
                            <h5 class="mb-0">Detalles del pedido</h5>
                        </div>
                        <div class="card-body">







                            <form th:action="@{/pedido/confirmar_pedido}" method="post" class="needs-validation" novalidate>

                                <input type="hidden" name="idPedido" th:value="${pedido.idPedido}" />

                                <label class="form-label">Seleccionar dirección:</label>

                                <div class="row">
                                    <div class="col-12 mb-3" th:each="d, stat : ${direcciones}">

                                        <div class="form-check">

                                            <input class="form-check-input"
                                                   type="radio"
                                                   name="idDireccion"
                                                   th:value="${d.idDireccion}"
                                                   th:id="'dir_' + ${d.idDireccion}"
                                                   th:checked="${stat.index == 0}"
                                                   autocomplete="off"
                                                   required>

                                                <label class="form-check-label w-100" th:for="'dir_' + ${d.idDireccion}">

                                                    <div class="card p-3 shadow-sm h-100">
                                                        <strong th:text="${d.provincia}"></strong><br/>
                                                        <span th:text="${d.canton}"></span><br/>
                                                        <span th:text="${d.distrito}"></span><br/>
                                                        <span th:text="${d.codigoPostal}"></span><br/>
                                                        <small th:text="${d.direccionExacta}"></small>
                                                    </div>

                                                </label>
                                        </div>

                                    </div>
                                </div>

                                <label>Método de pago:</label>
                                <select name="metodoPago" class="form-select">
                                    <option value="TARJETA">Tarjeta</option>
                                    <option value="SINPE">SINPE</option>
                                </select>

                                <button class="btn btn-primary mt-3" type="submit">Confirmar compra</button>

                            </form>
                        </div>
                    </div>

                </div>

                <footer th:replace="~{general/layout :: footer}"></footer>
                <div th:replace="~{general/layout :: scripts}"></div>
                </body>

                </html>
